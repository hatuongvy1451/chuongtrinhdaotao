
<!-- Modal Thêm Khung Chương Trình -->
<div class="modal fade" id="modalThemKhung" tabindex="-1" role="dialog" aria-labelledby="modalThemKhungLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalThemKhungLabel"><i class="fas fa-plus"></i> Thêm Khung Chương Trình</h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Đóng">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <form id="formThemKhung" action="/themkhungCTDT" method="post">
        <div class="modal-body">
          <div class="form-group">
            <label for="maCTDT">Mã CTĐT</label>
            <input type="text" class="form-control" id="maCTDT" name="maCTDT" placeholder="Nhập mã chương trình đào tạo" required>
          </div>
          <div class="form-group">
            <label for="tenKhoi">Tên Khối</label>
            <input type="text" class="form-control" id="tenKhoi" name="tenKhoi" placeholder="Ví dụ: Khối Kiến Thức Cơ Sở" required>
          </div>
          <div class="form-group">
            <label for="loaiKhoi">Loại Khối</label>
            <select class="form-control" id="loaiKhoi" name="loaiKhoi">
              <option value="Bắt buộc">Bắt buộc</option>
              <option value="Tự chọn">Tự chọn</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tinChiBB">Tín chỉ bắt buộc</label>
            <input type="number" class="form-control" id="tinChiBB" name="tinChiBB" min="0" value="0" required>
          </div>
          <div class="form-group">
            <label for="tinChiTC">Tín chỉ tự chọn</label>
            <input type="number" class="form-control" id="tinChiTC" name="tinChiTC" min="0" value="0" required>
          </div>
          <div class="form-group">
            <label for="tongTinChi">Tổng tín chỉ</label>
            <input type="number" class="form-control" id="tongTinChi" name="tongTinChi" min="0" value="0" required readonly>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Lưu</button>
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
        </div>
      </form>
    </div>
  </div>
</div>

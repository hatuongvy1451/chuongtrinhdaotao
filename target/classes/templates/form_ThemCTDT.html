

<!-- Modal Thêm CTĐT -->
<div class="modal fade" id="modalAdd" tabindex="-1" role="dialog" aria-labelledby="modalAddLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <form class="modal-content" id="formAddCTDT" action="/themCTDT" method="post">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalAddLabel">Thêm chương trình đào tạo</h5>
        <!-- Nút X để đóng -->
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Đóng">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <!-- Các trường nhập liệu -->
          <div class="form-group col-md-6">
            <label for="maCTDT">Mã CTĐT <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="maCTDT" name="maCTDT" required>
          </div>
          <div class="form-group col-md-6">
            <label for="tenCTDT">Tên CTĐT <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="tenCTDT" name="tenCTDT" required>
          </div>
          <div class="form-group col-md-6">
            <label for="bacDaoTao">Bậc đào tạo <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="bacDaoTao" name="bacDaoTao" required>
          </div>
          <div class="form-group col-md-6">
            <label for="loaiBang">Loại bằng</label>
            <input type="text" class="form-control" id="loaiBang" name="loaiBang">
          </div>
          <div class="form-group col-md-6">
            <label for="hinhThucDaoTao">Loại hình đào tạo</label>
            <input type="text" class="form-control" id="hinhThucDaoTao" name="hinhThucDaoTao">
          </div>
          <div class="form-group col-md-3">
            <label for="thoiGian">Thời gian (năm) <span class="text-danger">*</span></label>
            <input type="number" step="0.1" class="form-control" id="thoiGian" name="thoiGian" required>
          </div>
          <div class="form-group col-md-3">
            <label for="tinChi">Tín chỉ tối thiểu</label>
            <input type="number" class="form-control" id="tinChi" name="tinChi">
          </div>
          <div class="form-group col-md-6">
            <label for="khoaQL">Khoa quản lý</label>
            <input type="text" class="form-control" id="khoaQL" name="khoaQL">
          </div>
          <div class="form-group col-md-6">
            <label for="ngonNgu">Ngôn ngữ</label>
            <input type="text" class="form-control" id="ngonNgu" name="ngonNgu">
          </div>
          <div class="form-group col-md-6">
            <label for="website">Website</label>
            <input type="url" class="form-control" id="website" name="website">
          </div>
          <div class="form-group col-md-6">
            <label for="banHanh">Ban hành</label>
            <input type="text" class="form-control" id="banHanh" name="banHanh">
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <!-- Chỉ giữ lại nút Lưu -->
        <button type="submit" class="btn btn-success">Lưu</button>
      </div>
    </form>
  </div>
</div>

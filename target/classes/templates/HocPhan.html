<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Học Phần</title>
    <link rel="stylesheet" type="text/css" href="css/HocPhan.css">
</head>
<body>
    <h1>Danh sách Học Phần</h1>

    <!-- Thanh tìm kiếm -->
    <div style="text-align: center; margin-bottom: 20px;">
        <form th:action="@{/hocphan/search}" method="get">
            <input type="text" name="keyword" placeholder="Nhập mã hoặc tên học phần..." style="padding: 5px; width: 300px;">
            <button type="submit" style="padding: 5px 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">Tìm kiếm</button>
        </form>
    </div>

    <!-- Bảng danh sách học phần -->
    <table class="table-container">
        <thead>
            <tr>
                <th>ID</th>
                <th>ID Khung CT</th>
                <th>Mã Học Phần</th>
                <th>Tên Học Phần</th>
                <th>Số Tín Chỉ</th>
                <th>Số Tiết Lý Thuyết</th>
                <th>Số Tiết Thực Hành</th>
                <th>Số Tiết Thực Tập</th>
                <th>Tổng Số Tiết</th>
                <th>Hệ Số Học Phần</th>
                <th>Sửa</th>
                <th>Xóa</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="hocPhan : ${hocPhans}">
                <td th:text="${hocPhan.id}"></td>
                <td th:text="${hocPhan.idKhungCt}"></td>
                <td th:text="${hocPhan.maHocPhan}"></td>
                <td th:text="${hocPhan.tenHocPhan}"></td>
                <td th:text="${hocPhan.soTinChi}"></td>
                <td th:text="${hocPhan.soTietLyThuyet}"></td>
                <td th:text="${hocPhan.soTietThucHanh}"></td>
                <td th:text="${hocPhan.soTietThucTap}"></td>
                <td th:text="${hocPhan.soTietCong}"></td>
                <td th:text="${hocPhan.heSoHocPhan}"></td>
                <td>
                    <!-- Nút Sửa -->
                    <a th:href="@{/hocphan/edit/{id}(id=${hocPhan.id})}" class="sua">Sửa</a>
                </td>
                <td>
                    <!-- Nút Xóa -->
                    <a th:href="@{/hocphan/delete/{id}(id=${hocPhan.id})}" class="xoa">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Nút Thêm -->
    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/hocphan/add}" class="them">Thêm học phần</a>
    </div>
</body>
</html>

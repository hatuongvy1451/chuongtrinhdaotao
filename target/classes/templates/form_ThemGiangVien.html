
<!-- Modal Thêm Giảng Viên -->
<div class="modal fade" id="modalThemGV" tabindex="-1" role="dialog" aria-labelledby="modalThemGVLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <form class="modal-content" id="formThemGV" action="/themgiangvien" method="post">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalThemGVLabel">Thêm giảng viên</h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Đóng">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="maGV">Mã giảng viên <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="maGV" name="maGV" required>
          </div>
          <div class="form-group col-md-6">
            <label for="tenGV">Tên giảng viên <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="tenGV" name="tenGV" required>
          </div>
          <div class="form-group col-md-6">
            <label for="chuyenMon">Chuyên môn <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="chuyenMon" name="chuyenMon" required>
          </div>
          <div class="form-group col-md-6">
            <label for="loaiGV">Loại giảng viên</label>
            <input type="text" class="form-control" id="loaiGV" name="loaiGV">
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="submit" class="btn btn-success">Lưu</button>
      </div>
    </form>
  </div>
</div>
